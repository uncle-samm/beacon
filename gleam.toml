name = "beacon"
version = "0.1.0"
description = "A full-stack Gleam web framework combining LiveView-style server rendering with type-safe routing and VDOM diffing on the BEAM."
licences = ["MIT"]
repository = { type = "github", user = "beacon-gleam", repo = "beacon" }
target = "erlang"

[dependencies]
gleam_stdlib = ">= 0.44.0 and < 2.0.0"
gleam_erlang = ">= 1.3.0 and < 2.0.0"
gleam_otp = ">= 1.2.0 and < 2.0.0"
gleam_http = ">= 4.3.0 and < 5.0.0"
gleam_json = ">= 3.1.0 and < 4.0.0"
gleam_crypto = ">= 1.5.1 and < 2.0.0"
glance = ">= 6.0.0 and < 7.0.0"
logging = ">= 1.3.0 and < 2.0.0"
simplifile = ">= 2.4.0 and < 3.0.0"

[dev-dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"
